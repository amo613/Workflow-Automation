<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hume EVI Test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 600px;
        width: 100%;
      }
      h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
        font-size: 28px;
      }
      .status {
        padding: 12px 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      .status.connected {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .status.disconnected {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .status.connecting {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffeaa7;
      }
      button {
        padding: 15px 30px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        width: 100%;
        margin-bottom: 10px;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      button:active {
        transform: translateY(0);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .btn-connect {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      .btn-disconnect {
        background: #6c757d;
        color: white;
      }
      .log {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 2px solid #e9ecef;
      }
      .log h2 {
        color: #333;
        margin-bottom: 15px;
        font-size: 20px;
      }
      .log-content {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 15px;
        max-height: 300px;
        overflow-y: auto;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: #333;
      }
      .log-entry {
        margin-bottom: 5px;
        padding: 5px;
        border-radius: 4px;
      }
      .log-entry.info {
        background: #e7f3ff;
        color: #004085;
      }
      .log-entry.error {
        background: #f8d7da;
        color: #721c24;
      }
      .log-entry.success {
        background: #d4edda;
        color: #155724;
      }
      .call-section {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 2px solid #e9ecef;
      }
      .call-section h2 {
        color: #333;
        margin-bottom: 15px;
        font-size: 20px;
      }
      .input-group {
        margin-bottom: 15px;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
      }
      .input-group input,
      .input-group select,
      .input-group textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e9ecef;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s ease;
      }
      .input-group input:focus,
      .input-group select:focus,
      .input-group textarea:focus {
        outline: none;
        border-color: #667eea;
      }
      .input-group input:disabled,
      .input-group textarea:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
      }
      .btn-call {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        color: white;
      }
      .config-section {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 2px solid #e9ecef;
      }
      .config-section h2 {
        color: #333;
        margin-bottom: 15px;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .config-section h2:hover {
        color: #667eea;
      }
      .config-content {
        display: none;
        margin-top: 15px;
      }
      .config-content.expanded {
        display: block;
      }
      .config-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 15px;
      }
      .config-row.full {
        grid-template-columns: 1fr;
      }
      .config-row textarea {
        min-height: 80px;
        resize: vertical;
        font-family: inherit;
      }
      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .checkbox-group input[type='checkbox'] {
        width: auto;
        margin: 0;
      }
      .btn-save-config {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎤 Hume EVI Test</h1>
      <div id="status" class="status disconnected">Disconnected</div>
      <button id="connectBtn" class="btn-connect">Connect</button>
      <button id="disconnectBtn" class="btn-disconnect" disabled>
        Disconnect
      </button>

      <div class="config-section">
        <h2 id="configToggle">
          ⚙️ Configuration <span id="configToggleIcon">▼</span>
        </h2>
        <div id="configContent" class="config-content">
          <div class="config-row">
            <div class="input-group">
              <label for="eviVersion">EVI Version:</label>
              <select id="eviVersion">
                <option value="4-mini">EVI 4 Mini</option>
                <option value="3">EVI 3</option>
              </select>
            </div>
            <div class="input-group">
              <label for="voice">Voice:</label>
              <input
                type="text"
                id="voice"
                placeholder="Bianca"
                value="Bianca"
              />
            </div>
          </div>
          <div class="config-row">
            <div class="input-group">
              <label for="languageModel">Language Model:</label>
              <input
                type="text"
                id="languageModel"
                placeholder="GPT 5 Mini"
                value="GPT 5 Mini"
              />
            </div>
            <div class="input-group">
              <label for="temperature">Temperature (0-2):</label>
              <input
                type="number"
                id="temperature"
                min="0"
                max="2"
                step="0.1"
                value="1.0"
              />
            </div>
          </div>
          <div class="config-row full">
            <div class="input-group">
              <label for="systemPrompt">System Prompt:</label>
              <textarea
                id="systemPrompt"
                placeholder="Be a great salesman and sell like hell"
              >
Be a great salesman and sell like hell</textarea
              >
            </div>
          </div>
          <div class="config-row">
            <div class="input-group">
              <div class="checkbox-group">
                <input type="checkbox" id="initialMessageDisabled" />
                <label for="initialMessageDisabled"
                  >Disable initial message</label
                >
              </div>
              <textarea
                id="initialMessage"
                placeholder="Enter an initial message..."
              ></textarea>
            </div>
            <div class="input-group">
              <div class="checkbox-group">
                <input type="checkbox" id="resumeMessageDisabled" />
                <label for="resumeMessageDisabled"
                  >Disable resume conversation message</label
                >
              </div>
              <textarea
                id="resumeMessage"
                placeholder="Enter a resume conversation message..."
              ></textarea>
            </div>
          </div>
          <div class="config-row">
            <div class="input-group">
              <div class="checkbox-group">
                <input type="checkbox" id="nudgesEnabled" />
                <label for="nudgesEnabled">Enable inactivity nudges</label>
              </div>
              <input
                type="number"
                id="inactivityTimeout"
                placeholder="120"
                value="120"
                min="1"
              />
              <textarea
                id="inactivityMessage"
                placeholder="Inactivity message..."
                style="margin-top: 10px"
              ></textarea>
            </div>
            <div class="input-group">
              <div class="checkbox-group">
                <input type="checkbox" id="inactivityTimeoutDisabled" />
                <label for="inactivityTimeoutDisabled"
                  >Disable inactivity timeout</label
                >
              </div>
              <input
                type="number"
                id="inactivityTimeoutDuration"
                placeholder="120"
                value="120"
                min="1"
                disabled
              />
              <textarea
                id="inactivityTimeoutMessage"
                placeholder="Inactivity timeout message..."
                style="margin-top: 10px"
                disabled
              ></textarea>
            </div>
          </div>
          <div class="config-row">
            <div class="input-group">
              <div class="checkbox-group">
                <input type="checkbox" id="maxDurationDisabled" />
                <label for="maxDurationDisabled"
                  >Disable maximum duration</label
                >
              </div>
              <input
                type="number"
                id="maxDuration"
                placeholder="1800"
                value="1800"
                min="1"
                disabled
              />
              <textarea
                id="maxDurationMessage"
                placeholder="Maximum duration message..."
                style="margin-top: 10px"
                disabled
              ></textarea>
            </div>
            <div class="input-group">
              <label>Tools:</label>
              <div class="checkbox-group" style="margin-bottom: 10px">
                <input type="checkbox" id="webSearchEnabled" />
                <label for="webSearchEnabled">Enable web search</label>
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="hangUpEnabled" checked />
                <label for="hangUpEnabled">Enable hang up</label>
              </div>
            </div>
          </div>
          <button id="saveConfigBtn" class="btn-save-config">
            Save Configuration
          </button>
        </div>
      </div>

      <div class="call-section">
        <h2>📞 Outbound Call</h2>
        <div class="input-group">
          <label for="phoneNumber"
            >Phone Number(s) (E.164 format, e.g. +1234567890):</label
          >
          <input
            type="tel"
            id="phoneNumber"
            placeholder="+49123456789, +49987654321"
            pattern="^\+[1-9]\d{1,14}$"
          />
          <small
            style="
              color: #666;
              font-size: 0.85em;
              margin-top: 4px;
              display: block;
            "
          >
            💡 Tip: Separate multiple numbers with commas (e.g., +49123456789,
            +49987654321) for bulk calls
          </small>
        </div>
        <button id="callBtn" class="btn-call">Make Call</button>
      </div>

      <div class="log">
        <h2>Log</h2>
        <div id="logContent" class="log-content"></div>
      </div>
    </div>

    <script type="module">
      let socket = null;
      let recorder = null;
      let player = null;
      let audioContext = null;
      let sourceNode = null;
      let audioQueue = [];
      let isPlaying = false;

      function log(msg, type = 'info') {
        const logContent = document.getElementById('logContent');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
        console.log(msg);
      }

      function updateStatus(text, className) {
        const status = document.getElementById('status');
        status.textContent = text;
        status.className = `status ${className}`;
      }

      function updateButtons(connected) {
        document.getElementById('connectBtn').disabled = connected;
        document.getElementById('disconnectBtn').disabled = !connected;
      }

      // Load only browser-compatible utilities from Hume SDK
      async function loadHumeBrowserUtils() {
        try {
          // Load only the browser utility functions (these don't have Node.js deps)
          const utils = await import(
            '/node_modules/hume/dist/esm/wrapper/getBrowserSupportedMimeType.mjs'
          );
          const streamUtils = await import(
            '/node_modules/hume/dist/esm/wrapper/getAudioStream.mjs'
          );
          const trackUtils = await import(
            '/node_modules/hume/dist/esm/wrapper/ensureSingleValidAudioTrack.mjs'
          );
          const base64Utils = await import(
            '/node_modules/hume/dist/esm/wrapper/convertBlobToBase64.mjs'
          );
          const playerModule = await import(
            '/node_modules/hume/dist/esm/wrapper/EVIWebAudioPlayer.mjs'
          );

          return {
            getBrowserSupportedMimeType: utils.getBrowserSupportedMimeType,
            MimeType: utils.MimeType,
            getAudioStream: streamUtils.getAudioStream,
            ensureSingleValidAudioTrack: trackUtils.ensureSingleValidAudioTrack,
            convertBlobToBase64: base64Utils.convertBlobToBase64,
            EVIWebAudioPlayer: playerModule.EVIWebAudioPlayer,
          };
        } catch (error) {
          log(
            `❌ Failed to load Hume browser utilities: ${error.message}`,
            'error'
          );
          console.error('Hume utils load error:', error);
          throw error;
        }
      }

      async function startAudioCapture(socket, timeSliceMs = 10) {
        const hume = await loadHumeBrowserUtils();

        const mimeTypeResult = hume.getBrowserSupportedMimeType();
        // Use OPUS in WEBM for best compression and latency balance
        const mimeType = mimeTypeResult.success
          ? mimeTypeResult.mimeType
          : 'audio/webm;codecs=opus'; // Explicitly use OPUS for lower latency

        const micAudioStream = await hume.getAudioStream();
        hume.ensureSingleValidAudioTrack(micAudioStream);

        // Optimize MediaRecorder for balanced latency/throughput
        const recorder = new MediaRecorder(micAudioStream, {
          mimeType,
          audioBitsPerSecond: 32000, // Higher bitrate but better quality-to-latency ratio
        });

        // Send audio IMMEDIATELY - no batching, no delays, no waiting
        let firstAudioSent = false;
        let audioChunkCount = 0;

        recorder.ondataavailable = e => {
          if (e.data.size > 0 && socket.readyState === WebSocket.OPEN) {
            const chunkTime = performance.now();
            audioChunkCount++;

            if (!firstAudioSent) {
              firstAudioSent = true;
              const timeSinceConnection = audioStartTime
                ? (performance.now() - audioStartTime).toFixed(0)
                : '?';
              log(
                `⚡ First audio chunk ready (${timeSinceConnection}ms after connection)`,
                'info'
              );
              console.log(`⚡ First audio chunk ready`);
            }

            // Track when audio is being sent (for latency calculation)
            lastUserInputTime = chunkTime;

            // Send immediately - no buffering, no batching, no timers
            hume
              .convertBlobToBase64(e.data)
              .then(data => {
                if (socket.readyState === WebSocket.OPEN) {
                  socket.send(
                    JSON.stringify({
                      type: 'audio_input',
                      data: data,
                    })
                  );
                  // Log occasionally to show audio is streaming
                  if (audioChunkCount % 50 === 0) {
                    console.log(`📤 Audio chunk ${audioChunkCount} sent`);
                  }
                }
              })
              .catch(error => {
                if (error.message && !error.message.includes('abort')) {
                  console.error('Base64 conversion error:', error);
                }
              });
          }
        };

        recorder.onerror = e => {
          log(`MediaRecorder error: ${e}`, 'error');
          console.error('MediaRecorder error:', e);
        };

        recorder.start(timeSliceMs);
        log('🎤 Audio capture started', 'success');
        return recorder;
      }

      async function handleOpen() {
        log('✅ Socket opened', 'success');
        updateStatus('Connected', 'connected');
        updateButtons(true);

        // Start audio capture IMMEDIATELY - don't wait for player
        // Audio must start streaming as fast as possible to reduce latency
        try {
          recorder = await startAudioCapture(socket);
          log('🎤 Audio streaming started - speak now!', 'success');
        } catch (error) {
          log(`❌ Failed to start audio capture: ${error.message}`, 'error');
          console.error('Audio capture error:', error);
        }

        // Initialize audio player in background (non-blocking)
        (async () => {
          try {
            const hume = await loadHumeBrowserUtils();
            player = new hume.EVIWebAudioPlayer();
            await player.init();
            log('🔊 Audio player initialized', 'success');
          } catch (error) {
            log(
              `❌ Failed to initialize audio player: ${error.message}`,
              'error'
            );
            console.error('Audio player init error:', error);
          }
        })();
      }

      let connectionClosed = false;
      let audioStartTime = null;
      let lastUserInputTime = null;
      let lastUserMessageTime = null;
      let lastInterruptionTime = null;

      async function handleMessage(msg) {
        // Stop processing if connection is closed
        if (
          connectionClosed &&
          msg.type !== 'error' &&
          msg.type !== 'disconnected'
        ) {
          return;
        }

        switch (msg.type) {
          case 'connected':
            connectionClosed = false;
            audioStartTime = performance.now();
            log('✅ ' + (msg.message || 'Connected'), 'success');
            break;
          case 'disconnected':
            connectionClosed = true;
            // Stop audio capture immediately
            if (recorder) {
              recorder.stream.getTracks().forEach(t => t.stop());
              recorder.stop();
              recorder = null;
            }
            log('🔌 ' + (msg.reason || 'Disconnected'), 'info');
            break;
          case 'audio_output':
            if (player && !connectionClosed) {
              // Calculate latency from last user input to audio output
              const audioOutputTime = performance.now();
              if (
                lastUserInputTime ||
                lastUserMessageTime ||
                lastInterruptionTime
              ) {
                const latency =
                  (audioOutputTime -
                    (lastInterruptionTime ||
                      lastUserMessageTime ||
                      lastUserInputTime)) /
                  1000;
                if (latency < 10) {
                  // Only log reasonable latencies
                  console.log(
                    `🎵 Audio output received: ${latency.toFixed(2)}s after input`
                  );
                }
              }

              // Ultra-low latency: enqueue immediately without await
              // Use microtask to process audio as fast as possible
              Promise.resolve()
                .then(() => {
                  return player.enqueue(msg);
                })
                .catch(error => {
                  // Only log actual errors
                  if (error && error.message) {
                    log(
                      `❌ Failed to enqueue audio: ${error.message}`,
                      'error'
                    );
                    console.error('Audio enqueue error:', error);
                  }
                });
              // Minimal logging for performance
              if (Math.random() < 0.05) {
                log('🔊 Audio playing...', 'info');
              }
            } else if (!player && !connectionClosed) {
              log('⚠️ Audio received but player not initialized', 'error');
            }
            break;
          case 'user_interruption':
            lastInterruptionTime = performance.now();
            if (player) {
              player.stop();
            }
            log('⚠️ User interruption detected', 'info');
            console.log(
              `⚠️ USER INTERRUPTION at ${(lastInterruptionTime / 1000).toFixed(2)}s`
            );
            break;
          case 'user_message':
            const userText =
              msg.message?.text || msg.message?.content || 'Speaking...';
            lastUserMessageTime = performance.now();
            log(`👤 You: ${userText}`, 'info');
            console.log(
              `📤 USER MESSAGE at ${(lastUserMessageTime / 1000).toFixed(2)}s`
            );
            break;
          case 'assistant_message':
            const assistantText =
              msg.message?.content || msg.message?.text || 'Responding...';
            const responseTimestamp = performance.now();

            // Calculate latency from last user input
            let latency = null;
            let latencySource = '';

            if (lastInterruptionTime) {
              latency = (responseTimestamp - lastInterruptionTime) / 1000;
              latencySource = 'interruption';
              lastInterruptionTime = null; // Reset after calculating
            } else if (lastUserMessageTime) {
              latency = (responseTimestamp - lastUserMessageTime) / 1000;
              latencySource = 'user_message';
            } else if (lastUserInputTime) {
              latency = (responseTimestamp - lastUserInputTime) / 1000;
              latencySource = 'audio_input';
            }

            log(`🤖 Assistant: ${assistantText}`, 'success');

            if (latency !== null) {
              log(
                `⏱️ Response latency: ${latency.toFixed(2)}s (from ${latencySource})`,
                'info'
              );
              console.log(
                `⏱️ ⏱️ RESPONSE LATENCY: ${latency.toFixed(2)}s from ${latencySource} to assistant_message`
              );
            }
            break;
          case 'error':
            const errorMsg = msg.message || msg.error || 'Unknown error';
            // Only log first error, don't spam
            if (!connectionClosed) {
              log(`❌ Error: ${errorMsg}`, 'error');
              // If it's a connection error, mark as closed
              if (
                errorMsg.includes('connection closed') ||
                errorMsg.includes('connection lost')
              ) {
                connectionClosed = true;
                // Stop audio capture
                if (recorder) {
                  recorder.stream.getTracks().forEach(t => t.stop());
                  recorder.stop();
                  recorder = null;
                }
              }
            }
            break;
          default:
            log(`📥 Received: ${msg.type}`, 'info');
        }
      }

      function handleError(err) {
        log(`❌ Error: ${err.message || err}`, 'error');
        console.error('WebSocket error:', err);
      }

      function handleClose(e) {
        log(`🔌 Socket closed: ${e.code} ${e.reason || ''}`, 'info');
        updateStatus('Disconnected', 'disconnected');
        updateButtons(false);

        // Stop audio capture
        if (recorder) {
          recorder.stream.getTracks().forEach(t => t.stop());
          recorder = null;
        }

        // Dispose audio player
        if (player) {
          player.dispose();
          player = null;
        }
      }

      async function connect() {
        try {
          log('🔄 Connecting to Hume EVI via server proxy...', 'info');
          updateStatus('Connecting...', 'connecting');

          // Get current config and encode it
          const config = getConfigFromForm();
          const configParam = btoa(JSON.stringify(config));

          // Connect to our server WebSocket proxy with config
          const protocol =
            window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const wsUrl = `${protocol}//${window.location.host}/api/hume-evi/connect?sessionId=test-${Date.now()}&config=${encodeURIComponent(configParam)}`;

          log('🔄 Creating WebSocket connection to server proxy...', 'info');
          socket = new WebSocket(wsUrl);

          socket.onopen = handleOpen;
          socket.onmessage = event => {
            try {
              const msg = JSON.parse(event.data);
              handleMessage(msg);
            } catch (error) {
              log(`❌ Failed to parse message: ${error.message}`, 'error');
            }
          };
          socket.onerror = handleError;
          socket.onclose = handleClose;
        } catch (error) {
          log(`❌ Connection error: ${error.message}`, 'error');
          updateStatus('Connection Failed', 'disconnected');
          console.error('Connection error:', error);
        }
      }

      function disconnect() {
        if (socket) {
          socket.close();
          socket = null;
        }
        updateStatus('Disconnected', 'disconnected');
        updateButtons(false);
      }

      // Configuration management
      let currentConfig = {};
      let createdConfigId = null; // Store created config ID

      // Toggle config section
      document.getElementById('configToggle').addEventListener('click', () => {
        const content = document.getElementById('configContent');
        const icon = document.getElementById('configToggleIcon');
        content.classList.toggle('expanded');
        icon.textContent = content.classList.contains('expanded') ? '▲' : '▼';
      });

      // Load default config
      async function loadDefaultConfig() {
        try {
          const response = await fetch('/api/test-hume/config');
          const data = await response.json();
          if (data.success && data.config) {
            currentConfig = data.config;
            applyConfigToForm(data.config);
          }
        } catch (error) {
          log(`⚠️ Failed to load default config: ${error.message}`, 'error');
        }
      }

      // Apply config to form
      function applyConfigToForm(config) {
        document.getElementById('eviVersion').value =
          config.eviVersion || '4-mini';
        document.getElementById('voice').value = config.voice || 'Bianca';
        document.getElementById('languageModel').value =
          config.languageModel || 'GPT 5 Mini';
        document.getElementById('temperature').value =
          config.temperature || 1.0;
        document.getElementById('systemPrompt').value =
          config.systemPrompt || '';
        document.getElementById('initialMessageDisabled').checked =
          config.initialMessageDisabled || false;
        document.getElementById('initialMessage').value =
          config.initialMessage || '';
        document.getElementById('resumeMessageDisabled').checked =
          config.resumeMessageDisabled || false;
        document.getElementById('resumeMessage').value =
          config.resumeMessage || '';
        document.getElementById('nudgesEnabled').checked =
          config.nudgesEnabled || false;
        document.getElementById('inactivityTimeout').value =
          config.inactivityTimeout || 120;
        document.getElementById('inactivityMessage').value =
          config.inactivityMessage || '';
        document.getElementById('inactivityTimeoutDisabled').checked =
          config.inactivityTimeoutDisabled || false;
        document.getElementById('inactivityTimeoutDuration').value =
          config.inactivityTimeout || 120;
        document.getElementById('inactivityTimeoutMessage').value =
          config.inactivityTimeoutMessage || '';
        document.getElementById('maxDurationDisabled').checked =
          config.maxDurationDisabled || false;
        document.getElementById('maxDuration').value =
          config.maxDuration || 1800;
        document.getElementById('maxDurationMessage').value =
          config.maxDurationMessage || '';
        document.getElementById('webSearchEnabled').checked =
          config.webSearchEnabled || false;
        document.getElementById('hangUpEnabled').checked =
          config.hangUpEnabled !== false;
        updateDisabledStates();
      }

      // Get config from form
      function getConfigFromForm() {
        return {
          eviVersion: document.getElementById('eviVersion').value,
          voice: document.getElementById('voice').value,
          languageModel: document.getElementById('languageModel').value,
          languageModelProvider: 'OPEN_AI',
          temperature: parseFloat(document.getElementById('temperature').value),
          systemPrompt: document.getElementById('systemPrompt').value,
          initialMessageDisabled: document.getElementById(
            'initialMessageDisabled'
          ).checked,
          initialMessage: document.getElementById('initialMessage').value,
          resumeMessageDisabled: document.getElementById(
            'resumeMessageDisabled'
          ).checked,
          resumeMessage: document.getElementById('resumeMessage').value,
          nudgesEnabled: document.getElementById('nudgesEnabled').checked,
          inactivityTimeout:
            parseInt(document.getElementById('inactivityTimeout').value) || 120,
          inactivityMessage: document.getElementById('inactivityMessage').value,
          inactivityTimeoutDisabled: document.getElementById(
            'inactivityTimeoutDisabled'
          ).checked,
          inactivityTimeoutDuration:
            parseInt(
              document.getElementById('inactivityTimeoutDuration').value
            ) || 120,
          inactivityTimeoutMessage: document.getElementById(
            'inactivityTimeoutMessage'
          ).value,
          maxDurationDisabled: document.getElementById('maxDurationDisabled')
            .checked,
          maxDuration:
            parseInt(document.getElementById('maxDuration').value) || 1800,
          maxDurationMessage:
            document.getElementById('maxDurationMessage').value,
          webSearchEnabled: document.getElementById('webSearchEnabled').checked,
          hangUpEnabled: document.getElementById('hangUpEnabled').checked,
        };
      }

      // Update disabled states based on checkboxes
      function updateDisabledStates() {
        const inactivityDisabled = document.getElementById(
          'inactivityTimeoutDisabled'
        ).checked;
        document.getElementById('inactivityTimeoutDuration').disabled =
          inactivityDisabled;
        document.getElementById('inactivityTimeoutMessage').disabled =
          inactivityDisabled;

        const maxDurationDisabled = document.getElementById(
          'maxDurationDisabled'
        ).checked;
        document.getElementById('maxDuration').disabled = maxDurationDisabled;
        document.getElementById('maxDurationMessage').disabled =
          maxDurationDisabled;
      }

      // Setup checkbox change listeners
      document
        .getElementById('inactivityTimeoutDisabled')
        .addEventListener('change', updateDisabledStates);
      document
        .getElementById('maxDurationDisabled')
        .addEventListener('change', updateDisabledStates);

      // Save config - creates a new config via Hume API
      document
        .getElementById('saveConfigBtn')
        .addEventListener('click', async () => {
          try {
            const config = getConfigFromForm();

            // Validate config first
            const validateResponse = await fetch(
              '/api/test-hume/config/validate',
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config),
              }
            );

            const validateData = await validateResponse.json();
            if (!validateData.valid) {
              log(
                `❌ Configuration validation failed: ${validateData.errors.join(', ')}`,
                'error'
              );
              return;
            }

            // Create config via Hume API
            log('🔄 Creating Hume EVI configuration...', 'info');
            const createResponse = await fetch('/api/test-hume/config/create', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(config),
            });

            const createData = await createResponse.json();
            if (createResponse.ok && createData.success) {
              currentConfig = config;
              createdConfigId = createData.configId;
              log(
                `✅ Configuration created successfully! Config ID: ${createdConfigId}`,
                'success'
              );
              console.log('Created Config ID:', createdConfigId);
            } else {
              log(
                `❌ Failed to create configuration: ${createData.error || createData.message}`,
                'error'
              );
            }
          } catch (error) {
            log(`❌ Failed to save configuration: ${error.message}`, 'error');
            console.error('Save config error:', error);
          }
        });

      // Button event listeners
      document.getElementById('connectBtn').addEventListener('click', connect);
      document
        .getElementById('disconnectBtn')
        .addEventListener('click', disconnect);

      // Outbound call functionality
      const phoneNumberInput = document.getElementById('phoneNumber');
      const callBtn = document.getElementById('callBtn');

      async function makeCall() {
        const phoneInput = phoneNumberInput.value.trim();

        if (!phoneInput) {
          log('❌ Please enter a phone number', 'error');
          return;
        }

        // Parse phone numbers - support comma-separated values for bulk calls
        const phoneNumbers = phoneInput
          .split(',')
          .map(num => num.trim())
          .filter(num => num.length > 0);

        if (phoneNumbers.length === 0) {
          log('❌ Please enter at least one phone number', 'error');
          return;
        }

        // Validate E.164 format for all numbers
        const invalidNumbers = phoneNumbers.filter(num => !num.startsWith('+'));
        if (invalidNumbers.length > 0) {
          log(
            `❌ Phone numbers must be in E.164 format (e.g. +1234567890). Invalid: ${invalidNumbers.join(', ')}`,
            'error'
          );
          return;
        }

        // Determine if this is a single call or bulk call
        const isBulk = phoneNumbers.length > 1;
        // toNumber can be string (single) or array (bulk)
        const toNumber = isBulk ? phoneNumbers : phoneNumbers[0];

        try {
          callBtn.disabled = true;
          callBtn.textContent = isBulk
            ? `Creating job for ${phoneNumbers.length} numbers...`
            : 'Creating job...';

          if (isBulk) {
            log(
              `🔄 Creating phone call job for ${phoneNumbers.length} numbers...`,
              'info'
            );
            log(`📞 Numbers: ${phoneNumbers.join(', ')}`, 'info');
          } else {
            log(`🔄 Creating phone call job for ${toNumber}...`, 'info');
          }

          let config = null;
          if (createdConfigId) {
            log(`📋 Using saved config ID: ${createdConfigId}`, 'info');
            config = null;
          } else {
            config = getConfigFromForm();
            log(
              '⚠️ No saved config ID found, config will be created during job execution',
              'info'
            );
          }

          const response = await fetch('/api/test-hume/call', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              toNumber,
              config,
              configId: createdConfigId || null,
            }),
          });

          const data = await response.json();

          if (response.ok) {
            log(`✅ Phone call job created successfully!`, 'success');
            log(`📋 Job ID: ${data.job.id}`, 'info');
            log(`📊 Status: ${data.job.status}`, 'info');
            log(`💡 Track job status at /api/jobs/${data.job.id}`, 'info');
            if (isBulk) {
              log(
                `📞 Calling ${phoneNumbers.length} number(s) via job queue`,
                'info'
              );
            } else {
              log(`📞 Calling ${toNumber} via job queue`, 'info');
            }
          } else {
            log(
              `❌ Failed to create call job: ${data.error || data.message}`,
              'error'
            );
          }
        } catch (error) {
          log(`❌ Error making call: ${error.message}`, 'error');
          console.error('Call error:', error);
        } finally {
          callBtn.disabled = false;
          callBtn.textContent = 'Make Call';
        }
      }

      callBtn.addEventListener('click', makeCall);

      // Allow Enter key to trigger call
      phoneNumberInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
          makeCall();
        }
      });

      // Load default config on page load
      loadDefaultConfig();

      log('🚀 Hume EVI Test UI loaded', 'success');
    </script>
  </body>
</html>
