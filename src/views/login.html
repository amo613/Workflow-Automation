<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0b0f14;
        color: #e6edf3;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: #11161d;
        border: 1px solid #1f2a35;
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 10px 0 6px;
        color: #cbd5e1;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #2b3a48;
        background: #0e1318;
        color: #e6edf3;
        outline: none;
      }
      input:focus {
        border-color: #3b82f6;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
      }
      .error {
        margin-top: 10px;
        font-size: 12px;
        color: #f87171;
        text-align: center;
        display: none;
      }
    </style>
    <script>
      // Optional: client-side validation could be added here
    </script>
  </head>
  <body>
    <div class="card">
      <h1>Sign in</h1>
      <form
        method="POST"
        action="/api/auth/sign-in?redirectTo=/api/test-openai"
      >
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          required
          placeholder="you@example.com"
        />
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          placeholder="••••••••"
        />
        <button type="submit">Login</button>
        <div id="error" class="error"></div>
        <div class="hint">
          After login you'll be redirected to the OpenAI test page.
        </div>
      </form>
    </div>
  </body>
</html>
