name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: test
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://test:test@localhost:5432/testdb' }}
          REDIS_URL: redis://localhost:6379
        run: npm test
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: steps.test.outcome != 'cancelled'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
          if-no-files-found: ignore

      - name: Generate test summary
        if: always()
        run: |
          echo "# Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json')).total.lines.pct")
            echo "## Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "::warning::Code coverage is below 80%" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ Coverage is below 80% (currently ${COVERAGE}%)" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Coverage is above 80%" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.test.outcome }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test.outcome }}" == "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Tests failed!" >> $GITHUB_STEP_SUMMARY
            echo "::error::Some tests failed. Check the test output above for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Annotate test failures
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::Test suite failed. Please review the test output above."

      - name: Set status
        if: steps.test.outcome == 'failure'
        run: exit 1
