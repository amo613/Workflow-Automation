services:
  # Redis Cache for production
  redis:
    image: redis:7-alpine
    container_name: acquisitions-redis-prod
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - acquisitions-prod
    restart: unless-stopped

  # Node.js application for production
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: acquisitions-app-prod
    ports:
      - '${PORT:-3001}:3001'
    env_file:
      - .env.production
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      # Mount logs directory for production logging
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - acquisitions-prod

volumes:
  redis_prod_data:

networks:
  acquisitions-prod:
    driver: bridge
