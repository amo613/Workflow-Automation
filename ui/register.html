<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0b0f14;
        color: #e6edf3;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: #11161d;
        border: 1px solid #1f2a35;
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 10px 0 6px;
        color: #cbd5e1;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #2b3a48;
        background: #0e1318;
        color: #e6edf3;
        outline: none;
        box-sizing: border-box;
      }
      input:focus {
        border-color: #3b82f6;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #2563eb;
      }
      button:disabled {
        background: #475569;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
      }
      .error {
        margin-top: 10px;
        font-size: 12px;
        color: #f87171;
        text-align: center;
        display: none;
      }
      .error.show {
        display: block;
      }
      a {
        color: #3b82f6;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign up</h1>
      <form
        id="registerForm"
        method="POST"
        action="/api/auth/sign-up?redirectTo=/api/test-openai"
      >
        <label for="name">Name</label>
        <input
          id="name"
          name="name"
          type="text"
          required
          minlength="2"
          maxlength="255"
          placeholder="Your name"
          autocomplete="name"
        />
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          required
          placeholder="you@example.com"
          autocomplete="email"
        />
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          minlength="6"
          maxlength="128"
          placeholder="••••••••"
          autocomplete="new-password"
        />
        <button type="submit">Register</button>
        <div id="error" class="error"></div>
        <div class="hint">
          After registration you'll be redirected to the OpenAI test page.
        </div>
        <div class="hint" style="margin-top: 16px">
          Already have an account?
          <a href="/login" style="margin-left: 4px"> Go to Login </a>
        </div>
      </form>
    </div>
    <script>
      const form = document.getElementById('registerForm');
      const errorDiv = document.getElementById('error');

      // Check for error in URL params (from redirect)
      const urlParams = new URLSearchParams(window.location.search);
      const errorParam = urlParams.get('error');
      if (errorParam) {
        errorDiv.textContent = decodeURIComponent(errorParam);
        errorDiv.classList.add('show');
      }

      form.addEventListener('submit', async e => {
        e.preventDefault();

        // Reset error
        errorDiv.classList.remove('show');
        errorDiv.textContent = '';

        // Disable submit button
        const submitButton = form.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.textContent = 'Registering...';

        try {
          const formData = new FormData(form);
          const data = Object.fromEntries(formData.entries());

          const response = await fetch(form.action, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(data),
          });

          if (response.ok || response.redirected) {
            // Check if redirect is needed
            const redirectTo = new URL(form.action).searchParams.get(
              'redirectTo'
            );
            if (redirectTo) {
              window.location.href = redirectTo;
            } else if (response.redirected) {
              // Follow redirect from server
              window.location.href = response.url;
            } else {
              // Default redirect
              window.location.href = '/api/test-openai';
            }
          } else {
            let errorMessage = 'Registration failed. Please try again.';
            try {
              const result = await response.json();
              errorMessage = result.error || result.details || errorMessage;
            } catch {
              // If response is not JSON, use status text
              errorMessage = response.statusText || errorMessage;
            }
            errorDiv.textContent = errorMessage;
            errorDiv.classList.add('show');
            submitButton.disabled = false;
            submitButton.textContent = 'Register';
          }
        } catch (error) {
          errorDiv.textContent = 'An error occurred. Please try again.';
          errorDiv.classList.add('show');
          submitButton.disabled = false;
          submitButton.textContent = 'Register';
        }
      });
    </script>
  </body>
</html>
